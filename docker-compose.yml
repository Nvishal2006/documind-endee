services:
  endee:
    image: endeeio/endee-server:latest
    container_name: documind-endee
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    environment:
      - NDD_AUTH_TOKEN=documind_secret_token

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - ENDEE_SERVER_URL=http://endee:8080/api/v1
      - NDD_AUTH_TOKEN=documind_secret_token
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
    depends_on:
      - endee
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  endee_data:
  backend_data:
